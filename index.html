<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打菇鬧鐘計算器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #2c3e50;
            font-size: 22px;
            margin-bottom: 20px;
        }
        .section-title {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 10px;
            font-size: 15px;
            display: flex;
            align-items: center;
        }
        /* 轉盤外殼 */
        .picker-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 0;
            margin-bottom: 20px;
        }
        /* 單個滾輪的樣式 */
        .picker-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 30%;
        }
        .picker-label {
            font-size: 11px;
            color: #a0aec0;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        select {
            width: 80%;
            padding: 8px;
            font-size: 18px;
            font-weight: 600;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            background-color: #fff;
            text-align: center;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
        }
        select:focus {
            outline: none;
            border-color: #4299e1;
        }
        .colon {
            font-size: 20px;
            font-weight: bold;
            color: #a0aec0;
            padding-top: 15px;
        }
        /* 輸出結果 */
        .result-box {
            background-color: #ebf8ff;
            border: 1px solid #bee3f8;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
        }
        .result-label {
            font-size: 13px;
            color: #2b6cb0;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .result-time {
            font-size: 32px;
            font-weight: 700;
            color: #2b6cb0;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        /* 跳轉捷徑按鈕樣式 */
        .alarm-btn {
            display: inline-block;
            width: 100%;
            background-color: #319795;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            box-sizing: border-box;
            text-decoration: none;
            transition: background-color 0.2s;
            box-shadow: 0 2px 4px rgba(49, 151, 149, 0.2);
        }
        .alarm-btn:active {
            background-color: #234e52;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🍄 打菇鬧鐘計算器</h2>
    
    <div class="section-title">⏱️ 打菇剩餘時間</div>
    <div class="picker-container">
        <div class="picker-group">
            <span class="picker-label">時</span>
            <select id="rem-hr"></select>
        </div>
        <div class="colon">:</div>
        <div class="picker-group">
            <span class="picker-label">分</span>
            <select id="rem-min"></select>
        </div>
        <div class="colon">:</div>
        <div class="picker-group">
            <span class="picker-label">秒</span>
            <select id="rem-sec"></select>
        </div>
    </div>

    <div class="section-title">🕒 目前時間 (自動生成/可微調)</div>
    <div class="picker-container">
        <div class="picker-group">
            <span class="picker-label">時</span>
            <select id="cur-hr"></select>
        </div>
        <div class="colon">:</div>
        <div class="picker-group">
            <span class="picker-label">分</span>
            <select id="cur-min"></select>
        </div>
        <div class="colon">:</div>
        <div class="picker-group">
            <span class="picker-label">秒</span>
            <select id="cur-sec"></select>
        </div>
    </div>

    <div class="result-box">
        <div class="result-label">⏰ 設定鬧鐘時間 (+5分鐘)</div>
        <div id="alarmTime" class="result-time">--:--:--</div>
        <button class="alarm-btn" onclick="runAlarmShortcut()">👉 自動設定 iPhone 鬧鐘</button>
    </div>
</div>

<script>
    function populateSelect(selectEl, max, defaultVal) {
        selectEl.innerHTML = '';
        for (let i = 0; i < max; i++) {
            const opt = document.createElement('option');
            const valStr = String(i).padStart(2, '0');
            opt.value = i;
            opt.textContent = valStr;
            if (i === defaultVal) opt.selected = true;
            selectEl.appendChild(opt);
        }
    }

    const remHr = document.getElementById('rem-hr');
    const remMin = document.getElementById('rem-min');
    const remSec = document.getElementById('rem-sec');
    const curHr = document.getElementById('cur-hr');
    const curMin = document.getElementById('cur-min');
    const curSec = document.getElementById('cur-sec');
    const alarmOutput = document.getElementById('alarmTime');

    // 自動初始化目前時間
    const now = new Date();
    populateSelect(remHr, 24, 0);
    populateSelect(remMin, 60, 2);
    populateSelect(remSec, 60, 1);
    populateSelect(curHr, 24, now.getHours());
    populateSelect(curMin, 60, now.getMinutes());
    populateSelect(curSec, 60, now.getSeconds());

    function calculateAlarm() {
        const rHrs = Number(remHr.value);
        const rMins = Number(remMin.value);
        const rSecs = Number(remSec.value);
        const cHrs = Number(curHr.value);
        const cMins = Number(curMin.value);
        const cSecs = Number(curSec.value);

        let totalSeconds = (cHrs * 3600 + cMins * 60 + cSecs)
                         + (rHrs * 3600 + rMins * 60 + rSecs)
                         + (5 * 60);

        const secondsInDay = 24 * 3600;
        totalSeconds = totalSeconds % secondsInDay;

        const alarmHrs = Math.floor(totalSeconds / 3600);
        const alarmMins = Math.floor((totalSeconds % 3600) / 60);
        const alarmSecs = totalSeconds % 60;

        alarmOutput.innerText = [
            String(alarmHrs).padStart(2, '0'),
            String(alarmMins).padStart(2, '0'),
            String(alarmSecs).padStart(2, '0')
        ].join(':');
    }

    // 觸發 iPhone 捷徑並傳遞時間參數
    function runAlarmShortcut() {
        const alarmTimeText = alarmOutput.innerText;
        if (alarmTimeText === '--:--:--') return;

        // 捷徑名稱固定為「打菇鬧鐘」
        const shortcutName = encodeURIComponent('打菇鬧鐘');
        const inputParam = encodeURIComponent(alarmTimeText);

        // 透過 URL Scheme 喚醒捷徑
        window.location.href = `shortcuts://run-shortcut?name=${shortcutName}&input=${inputParam}`;
    }

    [remHr, remMin, remSec, curHr, curMin, curSec].forEach(select => {
        select.addEventListener('change', calculateAlarm);
    });

    calculateAlarm();
</script>

</body>
</html>
